<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunga Suhys | Helix Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020205;
            color: #e2e8f0;
            margin: 0;
            overflow-x: hidden;
            cursor: none;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(236, 72, 153, 0.2); }

        #root { min-height: 100vh; }

        @keyframes dna-float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .gene-node {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment, useMemo } = React;

        // --- Inline Icon Components (Fixes library errors) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Database: <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5m-18 0c0 1.66 4 3 9 3s9-1.34 9-3M3 5c0-1.66 4-3 9-3s9 1.34 9 3m-18 7c0 1.66 4 3 9 3s9-1.34 9-3" />,
                Zap: <path d="M13 2 L3 14 h9 l-1 8 10-12 h-9 l1-8z" />,
                Binary: <path d="M10 22h4M10 2h4M6 4v16M18 4v16M10 12h4" />,
                BookOpen: <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />,
                Award: <path d="m12 15 3.5 3.5L14 13l4-4h-5L12 3 11 9H6l4 4-1.5 5.5z" />,
                Fingerprint: <path d="M12 10a2 2 0 0 0-2 2M7 10.1a7 7 0 0 1 14 0M2 10.1a12 12 0 0 1 15.5-11.5M8 15a5 5 0 1 0 10 0M2 15a10 10 0 0 1 18.9-4.5M12 22v-3" />,
                X: <path d="M18 6L6 18M6 6l12 12" />,
                ChevronRight: <path d="M9 18l6-6-6-6" />,
                Maximize: <path d="M15 3h6v6M9 21H3v-6M21 15v6h-6M3 9V3h6" />,
                Mail: <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zM22 6l-10 7L2 6" />,
                Linkedin: <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2zM4 2a2 2 0 1 1 0 4 2 2 0 0 1 0-4z" />,
                Github: <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
            };

            return (
                <svg 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        // --- Custom Cursor ---
        const BioCursor = () => {
            const [pos, setPos] = useState({ x: -100, y: -100 });
            const [hover, setHover] = useState(false);

            useEffect(() => {
                const move = (e) => setPos({ x: e.clientX, y: e.clientY });
                const check = (e) => setHover(!!e.target.closest('button, a'));
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseover', check);
                return () => {
                    window.removeEventListener('mousemove', move);
                    window.removeEventListener('mouseover', check);
                };
            }, []);

            return (
                <div 
                    className="fixed pointer-events-none z-[9999] hidden md:flex items-center justify-center transition-transform duration-200"
                    style={{ left: pos.x, top: pos.y, transform: `translate(-50%, -50%) scale(${hover ? 1.5 : 1})` }}
                >
                    <div className={`w-8 h-8 border-2 rounded-full transition-colors ${hover ? 'border-pink-500 bg-pink-500/10' : 'border-white/20'}`} />
                    <div className={`absolute w-12 h-12 border-t-2 border-l-2 rounded-tl-xl transition-all ${hover ? 'border-green-500 -translate-x-2 -translate-y-2' : 'border-transparent'}`} />
                </div>
            );
        };

        // --- DNA Helix Animation ---
        const BackgroundHelix = () => {
            const [time, setTime] = useState(0);
            useEffect(() => {
                let frame;
                const loop = () => { setTime(t => t + 0.02); frame = requestAnimationFrame(loop); };
                loop();
                return () => cancelAnimationFrame(frame);
            }, []);

            const nodes = useMemo(() => Array.from({ length: 40 }).map((_, i) => ({ id: i, phase: i * 0.5, y: i * 4 })), []);

            return (
                <div className="fixed inset-0 pointer-events-none opacity-20 z-0 flex justify-center overflow-hidden">
                    <div className="relative w-64 h-full">
                        {nodes.map(node => (
                            <Fragment key={node.id}>
                                <div className="absolute w-2 h-2 rounded-full bg-pink-500 shadow-[0_0_10px_#ec4899]"
                                    style={{ top: `${node.y}%`, left: `${50 + Math.sin(node.phase + time) * 40}%`, opacity: (Math.cos(node.phase + time) + 1) / 2 }} />
                                <div className="absolute w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_10px_#3b82f6]"
                                    style={{ top: `${node.y}%`, left: `${50 - Math.sin(node.phase + time) * 40}%`, opacity: (Math.sin(node.phase + time) + 1) / 2 }} />
                                <div className="absolute h-px bg-white/10"
                                    style={{ top: `${node.y + 0.5}%`, left: `${50 - Math.sin(node.phase + time) * 40}%`, width: `${Math.abs(Math.sin(node.phase + time) * 80)}%` }} />
                            </Fragment>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [active, setActive] = useState(null);
            const [terminal, setTerminal] = useState([]);

            useEffect(() => {
                const lines = ["SEQ_BOOT: SUCCESS", "NIT_RAIPUR: B.TECH BIOTECH", "CORE_CGPA: 9.09", "PUB_SYNC: MASS_GATHERING_MED_2025"];
                let i = 0;
                const interval = setInterval(() => {
                    if (i < lines.length) { setTerminal(t => [...t, lines[i]]); i++; }
                    else clearInterval(interval);
                }, 400);
                return () => clearInterval(interval);
            }, []);

            const resume = {
                experience: [
                    { title: "IIT Roorkee", sub: "Research Intern (2025)", details: ["Bioinformatics analyses: BLAST, Seurat RNA-seq clustering, AlphaFold structural prediction.", "Developed Google Colab pipelines integrating R, Python, and Biopython for reproducibility.", "Managed HPC clusters via SSH for large-scale genomic computations."] },
                    { title: "Dr. Bharathi Diagnostics", sub: "Clinical Intern (2024)", details: ["Operated CBC, Biochemistry, Hormone (CLEA), and Urine analyzers.", "Performed CRP, HBA1C, RF, and ASO tests using nephelometry.", "Optimized diagnostic workflows and quality control systems."] }
                ],
                projects: [
                    { title: "Drug Discovery: AChE", sub: "ML/Bioinformatics", details: ["Processed 1,200+ ChEMBL records using RDKit; achieved R²: 0.82 in pIC50 prediction.", "Models: Random Forest, XGBoost with 5-fold cross validation."] },
                    { title: "Pathogenomics: E. coli", sub: "Bioinformatics", details: ["Comparative analysis of O157:H7 & EHEC using BLAST+ pipelines.", "Annotated 450+ ORFs linked to virulence; visualized in R."] },
                    { title: "Prototype FAT", sub: "AI/Quantum", details: ["Hybrid pipeline using NLP preprocessing and Qiskit quantum algorithms.", "Implemented Trust-XAI for transparency in pharmacological predictions."] },
                    { title: "Breast Cancer Classifier", sub: "ML/Python", details: ["Logistic regression on Wisconsin dataset; 96.7% accuracy, 0.98 ROC-AUC."] }
                ],
                publication: [
                    { title: "Silent Phage Mitigation", sub: "Mass Gathering Medicine, 2025", details: ["DOI: 10.1016/j.mgmed.2025.100024", "Analyzed Ganges water during Maha Kumbh Mela 2025.", "Contribution: Data curation and methodology."] }
                ],
                skills: [
                    { title: "Computational", sub: "Bio-Engineering", details: ["Python, R, C++, Bash, SQL", "AlphaFold, Seurat, BLAST, Biopython", "Linux (Arch), Git, Docker, HPC"] },
                    { title: "Laboratory", sub: "Wet Lab & Design", details: ["PCR, ELISA, Electrophoresis, Diagnostics", "Matplotlib, ggplot2, Canva, PowerPoint"] }
                ],
                achievements: [
                    { title: "Achievements", sub: "Competitions", details: ["1st: AI in Drug Discovery (NITRR)", "1st: ElevateX Quiz", "District Medal: Spell Bee", "Medal: National Sports Day (Chess)"] },
                    { title: "Certs", sub: "Education", details: ["UCSD: DNA Hidden Messages", "Udemy: Bioinfo from Scratch", "Google: Cybersecurity Foundations"] }
                ]
            };

            const genes = [
                { id: 'experience', label: 'EXPERIENCE_SEQ', icon: 'Database', color: 'from-pink-500' },
                { id: 'projects', label: 'PROJECTS_SEQ', icon: 'Zap', color: 'from-blue-500' },
                { id: 'publication', label: 'PUBLICATION_SEQ', icon: 'BookOpen', color: 'from-indigo-500' },
                { id: 'skills', label: 'SKILLS_SEQ', icon: 'Binary', color: 'from-green-500' },
                { id: 'achievements', label: 'AWARDS_SEQ', icon: 'Award', color: 'from-purple-500' }
            ];

            return (
                <div className="min-h-screen relative overflow-hidden bg-[#020205]">
                    <BioCursor />
                    <BackgroundHelix />
                    
                    <div className="max-w-7xl mx-auto px-6 py-12 relative z-20">
                        <header className="flex flex-col md:flex-row justify-between items-start gap-12 mb-24">
                            <div className="space-y-4">
                                <div className="flex items-center gap-3">
                                    <Icon name="Fingerprint" className="text-pink-500 animate-pulse" size={20} />
                                    <span className="text-[10px] font-mono tracking-[0.4em] text-pink-500 uppercase italic">NIT RAIPUR // BIOTECHNOLOGY // CGPA: 9.09</span>
                                </div>
                                <h1 className="text-7xl md:text-9xl font-black tracking-tighter text-white leading-[0.85] italic">THUNGA<br /><span className="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500">SUHYS</span></h1>
                                <p className="text-lg text-slate-400 max-w-lg font-light mt-6 leading-relaxed">Engineering the interface of <span className="text-white">Genomic Data</span> and <span className="text-white">Quantum-AI</span>.</p>
                                <div className="flex gap-6 pt-4">
                                    <a href="https://linkedin.com/in/suhys-thunga" target="_blank" className="hover:text-pink-500 transition-all hover:scale-110"><Icon name="Linkedin" /></a>
                                    <a href="https://github.com/suhys18" target="_blank" className="hover:text-blue-500 transition-all hover:scale-110"><Icon name="Github" /></a>
                                    <a href="mailto:tsuhys067.btech2022@bt.nitrr.ac.in" className="hover:text-green-500 transition-all hover:scale-110"><Icon name="Mail" /></a>
                                </div>
                            </div>

                            <div className="w-full md:w-80 p-6 bg-black/40 border border-white/5 rounded-3xl backdrop-blur-xl shadow-2xl">
                                <div className="flex items-center gap-2 mb-4 border-b border-white/10 pb-2">
                                    <div className="w-2 h-2 rounded-full bg-red-500" />
                                    <span className="text-[9px] font-mono text-slate-500 uppercase tracking-widest text-white">Helix_OS // v.4.0.1</span>
                                </div>
                                <div className="font-mono text-[10px] space-y-2 text-green-400/80">
                                    {terminal.map((line, i) => <div key={i}>{`> ${line}`}</div>)}
                                    <div className="animate-pulse">_</div>
                                </div>
                            </div>
                        </header>

                        <div className="relative flex flex-col items-center justify-center min-h-[60vh] gap-12">
                            {genes.map((gene, i) => (
                                <button key={gene.id} onClick={() => setActive(gene.id)} className="group relative flex items-center justify-center w-full max-w-2xl py-8 transition-all">
                                    <div className="absolute h-[1px] w-full bg-gradient-to-r from-transparent via-white/10 to-transparent group-hover:via-white/40 transition-all" />
                                    <div className="relative z-10 px-8 py-4 bg-black border border-white/10 rounded-full flex items-center gap-6 group-hover:border-white/50 group-hover:scale-110 transition-all shadow-2xl overflow-hidden">
                                        <div className={`absolute inset-0 bg-gradient-to-r ${gene.color} to-transparent opacity-0 group-hover:opacity-10 transition-opacity`} />
                                        <div className="text-white/40 group-hover:text-white transition-colors"><Icon name={gene.icon} size={24} /></div>
                                        <span className="text-xs font-mono tracking-[0.5em] text-slate-500 group-hover:text-white transition-colors uppercase">{gene.label}</span>
                                        <Icon name="ChevronRight" className="text-slate-700 group-hover:text-pink-500 group-hover:translate-x-2 transition-all" size={16} />
                                    </div>
                                    <span className="absolute right-0 text-[100px] font-black text-white/[0.02] italic tracking-tighter group-hover:text-white/[0.05] transition-all">{String(i + 1).padStart(2, '0')}</span>
                                </button>
                            ))}
                        </div>

                        {active && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-12">
                                <div className="absolute inset-0 bg-black/95 backdrop-blur-2xl animate-in fade-in" onClick={() => setActive(null)} />
                                <div className="relative w-full max-w-5xl bg-[#030308] border border-white/10 rounded-[4rem] overflow-hidden shadow-[0_0_150px_rgba(0,0,0,1)] animate-in zoom-in duration-300">
                                    <div className="flex justify-between items-start p-10 md:p-16">
                                        <div>
                                            <div className="flex items-center gap-2 mb-2"><div className="w-12 h-[2px] bg-pink-500" /><span className="text-[10px] font-mono text-pink-500 tracking-[0.5em] uppercase">SEQ_MODULE_{active}</span></div>
                                            <h2 className="text-5xl md:text-7xl font-black text-white uppercase tracking-tighter italic">{active}</h2>
                                        </div>
                                        <button onClick={() => setActive(null)} className="p-6 rounded-full bg-white/5 hover:bg-white/10 text-white transition-all group"><Icon name="X" size={32} className="group-hover:rotate-90 transition-transform" /></button>
                                    </div>
                                    <div className="px-10 md:px-16 pb-16 grid grid-cols-1 md:grid-cols-2 gap-10 max-h-[50vh] overflow-y-auto custom-scrollbar">
                                        {resume[active].map((item, i) => (
                                            <div key={i} className="group p-10 rounded-[3rem] bg-white/[0.02] border border-white/5 hover:border-white/20 transition-all relative overflow-hidden">
                                                <div className="absolute top-0 right-0 p-8"><Icon name="Maximize" className="text-white/5 group-hover:text-pink-500 transition-colors" size={16} /></div>
                                                <h3 className="text-2xl font-bold text-white mb-2 leading-none">{item.title}</h3>
                                                <p className="text-pink-500/80 font-mono text-[11px] uppercase tracking-widest mb-8">{item.sub}</p>
                                                <ul className="space-y-4">
                                                    {item.details.map((detail, j) => (
                                                        <li key={j} className="flex gap-4 text-sm text-slate-400 group-hover:text-slate-200 transition-colors"><div className="w-1.5 h-1.5 rounded-full bg-pink-500/40 mt-1.5 group-hover:bg-pink-500" />{detail}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="h-1 bg-gradient-to-r from-transparent via-pink-500 to-transparent animate-[pulse_2s_infinite]" />
                                </div>
                            </div>
                        )}

                        <footer className="mt-40 border-t border-white/5 py-12 flex flex-col md:flex-row justify-between items-center text-[10px] font-mono tracking-[0.5em] text-slate-600 uppercase">
                            <div className="flex gap-12"><span>Bio_Build: 4.0.9</span><span className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-green-500 animate-pulse" /> Seq_Stable</span></div>
                            <div className="flex flex-col md:items-end"><span>NIT Raipur // B.Tech Biotechnology</span><span className="mt-1">© {new Date().getFullYear()} Thunga Suhys</span></div>
                        </footer>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
